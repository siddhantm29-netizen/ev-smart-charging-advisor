name: Deploy to Hugging Face Spaces

# Mirrors main onto the HF Space's own git repo on every push, which
# triggers the Space to rebuild and restart. Runs after the scheduled data
# refresh (below) commits new data, so a fresh recommendation reaches the
# live app automatically without a separate manual step.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # HF's git backend rejects shallow pushes ("shallow update not allowed")

      - name: Convert large/binary files to Git LFS for the HF push
        # HF Spaces hard-rejects (a) any non-LFS file over 10 MiB — GitHub's
        # own limit is 100MB, so these are fine there — and, it turns out,
        # (b) *any* binary file at all pushed as a plain git blob, size
        # notwithstanding (found by actually trying: the >10MB CSVs/HTML
        # tripped (a) first, then every PNG in the repo tripped (b) on the
        # next attempt). This conversion only affects the disposable
        # checkout in this job, not the real GitHub history. `git lfs
        # migrate import` rewrites matching files to LFS pointers
        # throughout history rather than just the tip commit, so the
        # mirrored Space repo is self-consistent if HF ever needs an older
        # commit.
        run: |
          git lfs install
          # --everything: without an explicit ref, migrate import computes its
          # commit range relative to remote-tracking refs, which is empty
          # right after a fresh checkout (HEAD == origin/main) — it silently
          # rewrites nothing ("Rewriting commits: 100% (0/0)") rather than
          # erroring, which is what actually happened on the first attempt.
          git lfs migrate import --everything --include="data/processed/charging_stations_clean.csv,data/raw/charging_stations_*.csv,maps/*.html,*.png"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space "https://sid009991:${HF_TOKEN}@huggingface.co/spaces/sid009991/ev-smart-charging-advisor"
          git push --force space HEAD:main
